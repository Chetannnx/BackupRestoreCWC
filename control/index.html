<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQL Backup & Restore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- WinCC -->

  <script src="./js/webcc.min.js"></script>

  <!-- CSS -->

  <link rel="stylesheet" href="./keyboard.css">
</head>

<body>

<!-- ==========================
     🔥 MAIN CARD CONTAINER
========================== -->

<div class="main-card">

  <!-- ==========================
       🔥 TABS
  ========================== -->

  <div class="tabs">
    <button class="tab active" onclick="showTab(event,'auto')">Auto Backup</button>
    <button class="tab" onclick="showTab(event,'backup')">Manual</button>
    <button class="tab" onclick="showTab(event,'restore')">Restore</button>
  </div>

  <!-- ==========================
       🔥 TAB CONTENT
  ========================== -->

  <div class="tab-content">

```
<!-- ==========================
     🔥 AUTO BACKUP
========================== -->
<div id="autoTab" class="tab-pane active">

  <h3>Auto Backup Settings</h3>

  <!-- Target Machine -->
  <div class="form-group">
    <label>TARGET MACHINE</label>
    <div class="input-box">
      <span class="status-dot"></span>
      <input value="Cold Room Management System" readonly>
    </div>
  </div>

  <!-- Backup Path -->
  <div class="form-group">
    <label>BACKUP PATH</label>
    <div class="input-box">
      <input value="D:\Chetan\DBBackup" readonly>
    </div>
  </div>

  <!-- Interval -->
  <div class="form-group inline">
    <div>
      <label>INTERVAL</label>
      <div class="input-box small">
        <input id="backupMinutes" type="number" value="1">
         <!-- <input id="backupMinutes" type="number" value="1" readonly onclick="openKeyboard(this)"> -->
        <span class="unit">MIN</span>
      </div>
    </div>

    <div>
      <label>COMPRESSION</label>
      <div class="input-box small">
        <input value="Standard (GZ)" readonly>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="autoStatus">
    ● STATUS: STANDING BY
    <span class="logs">LOGS</span>
  </div>

  <!-- Button -->
  <button class="start-btn" onclick="startAutoBackup()">
    ▶ Start Auto Backup
  </button>

</div>

<!-- ==========================
     🔥 MANUAL BACKUP
========================== -->
<div id="backupTab" class="tab-pane">

  <h3>Manual Backup</h3>

  <div class="form-group">
    <label>BACKUP PATH</label>
    <div class="input-box">
      <input value="D:\Chetan\DBBackup" readonly>
    </div>
  </div>

  <div class="status" id="backupStatus">
    ● Backup Status: Idle
  </div>

  <button class="start-btn" onclick="manualBackup()">
    ▶ Backup Now
  </button>

</div>

<!-- ==========================
     🔥 RESTORE
========================== -->
<div id="restoreTab" class="tab-pane">

  <h3>Restore Backup</h3>

  <!-- Upload Box -->
  <div class="upload-box" onclick="openFilePicker()">

    <div class="upload-content" id="uploadContent">
      <div class="upload-icon">⬆</div>
      <p class="upload-title">Select Restore Point</p>
      <p class="upload-sub">Upload .bak or .sql files to begin</p>
    </div>

    <div class="selected-file hidden" id="selectedFile"></div>

  </div>

  <!-- Hidden File Input -->
  <input type="file" id="filePicker" accept=".bak,.sql" hidden onchange="handleFileSelect(event)">
  <input type="text" id="restorePath" hidden>

  <!-- Status -->
  <div class="status" id="restoreStatus">
    ● Restore Status: Idle
  </div>

  <!-- Button -->
  <button class="start-btn" onclick="restoreFromPath()">
    ▶ Restore Now
  </button>

</div>

</div>

<script src="./control.js"></script>

</body>
</html>
